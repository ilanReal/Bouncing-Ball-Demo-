<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfectly Elastic Bouncing Ball</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="simulationCanvas"></canvas>

<script>
    const canvas = document.getElementById('simulationCanvas');
    const ctx = canvas.getContext('2d');

    // Make canvas full screen
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Ball properties
    const ball = {
        x: canvas.width / 2,
        y: 50, // Starts near the top
        radius: 25,
        dx: 6, // Horizontal velocity
        dy: 0, // Initial vertical velocity
        color: '#00ffcc'
    };

    const gravity = 0.4; // Constant downward acceleration
    const durationLimit = 60000; // 60 seconds in milliseconds
    let startTime = null;

    function drawBall() {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = ball.color;
        ctx.fill();
        ctx.closePath();
    }

    function updatePhysics() {
        // Apply gravity to vertical velocity
        ball.dy += gravity;

        // Apply velocities to position
        ball.x += ball.dx;
        ball.y += ball.dy;

        // Collision: Floor
        if (ball.y + ball.radius > canvas.height) {
            ball.y = canvas.height - ball.radius; // Prevent sinking into the floor
            ball.dy = -ball.dy; // Perfectly elastic bounce (energy conserved)
        }

        // Collision: Ceiling
        if (ball.y - ball.radius < 0) {
            ball.y = ball.radius;
            ball.dy = -ball.dy;
        }

        // Collision: Left Wall
        if (ball.x - ball.radius < 0) {
            ball.x = ball.radius;
            ball.dx = -ball.dx;
        }

        // Collision: Right Wall
        if (ball.x + ball.radius > canvas.width) {
            ball.x = canvas.width - ball.radius;
            ball.dx = -ball.dx;
        }
    }

    function animate(timestamp) {
        // Set the start time on the very first frame
        if (!startTime) startTime = timestamp;
        const elapsedTime = timestamp - startTime;

        // Clear the screen for the new frame
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Check if 60 seconds have passed
        if (elapsedTime < durationLimit) {
            updatePhysics();
            drawBall();
            
            // Loop the animation
            requestAnimationFrame(animate);
        } else {
            // Draw the ball one last time where it stopped
            drawBall();
            
            // Display end message
            ctx.fillStyle = "white";
            ctx.font = "bold 36px Arial";
            ctx.textAlign = "center";
            ctx.fillText("60 Seconds Complete. Energy Conserved.", canvas.width / 2, canvas.height / 2);
        }
    }

    // Handle window resizing dynamically
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Ensure ball doesn't get trapped outside the screen if resized smaller
        if (ball.x > canvas.width) ball.x = canvas.width - ball.radius;
        if (ball.y > canvas.height) ball.y = canvas.height - ball.radius;
    });

    // Start the simulation
    requestAnimationFrame(animate);
</script>

</body>
</html>
