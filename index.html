<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Bouncing Ball & Energy Graph</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }
        #simCanvas {
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.85);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            color: white;
            width: 320px;
            backdrop-filter: blur(5px);
        }
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        #graphCanvas {
            background: #000;
            border: 1px solid #555;
            margin-top: 10px;
            border-radius: 4px;
        }
        .legend {
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
            line-height: 1.5;
        }
        button {
            width: 100%;
            padding: 8px;
            background: #00ffcc;
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        button:hover {
            background: #00ccaa;
        }
    </style>
</head>
<body>

<canvas id="simCanvas"></canvas>

<div id="ui-panel">
    <button id="resetBtn">Drop Ball</button>
    
    <div class="control-group">
        <label>Bounciness (Restitution) <span id="bVal">0.80</span></label>
        <input type="range" id="bounciness" min="0" max="1.5" step="0.05" value="0.8">
    </div>
    
    <div class="control-group">
        <label>Gravity <span id="gVal">0.50</span></label>
        <input type="range" id="gravity" min="0" max="1.5" step="0.05" value="0.5">
    </div>
    
    <div class="control-group">
        <label>Air Friction (Damping) <span id="fVal">0.005</span></label>
        <input type="range" id="friction" min="0" max="0.05" step="0.001" value="0.005">
    </div>

    <canvas id="graphCanvas" width="320" height="150"></canvas>
    <div class="legend">
        <span style="color: white; font-weight: bold;">Total Energy</span> | 
        <span style="color: #ff4444;">Kinetic</span> | 
        <span style="color: #4488ff;">Potential</span> |
        <span style="color: #ffaa00;">Thermal</span>
    </div>
</div>

<script>
    const simCanvas = document.getElementById('simCanvas');
    const simCtx = simCanvas.getContext('2d');
    
    const graphCanvas = document.getElementById('graphCanvas');
    const graphCtx = graphCanvas.getContext('2d');

    // UI Elements
    const bInput = document.getElementById('bounciness');
    const gInput = document.getElementById('gravity');
    const fInput = document.getElementById('friction');
    const bVal = document.getElementById('bVal');
    const gVal = document.getElementById('gVal');
    const fVal = document.getElementById('fVal');

    // Physics parameters
    let physics = {
        bounciness: parseFloat(bInput.value),
        gravity: parseFloat(gInput.value),
        friction: parseFloat(fInput.value)
    };

    // Update UI and physics on slider change
    function setupSlider(input, display, key, toFixedParams) {
        input.addEventListener('input', (e) => {
            physics[key] = parseFloat(e.target.value);
            display.innerText = physics[key].toFixed(toFixedParams);
        });
    }
    setupSlider(bInput, bVal, 'bounciness', 2);
    setupSlider(gInput, gVal, 'gravity', 2);
    setupSlider(fInput, fVal, 'friction', 3);

    // Resize simulation canvas
    function resize() {
        simCanvas.width = window.innerWidth;
        simCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Ball object & Thermal Accumulator
    let ball = {
        x: simCanvas.width / 2,
        y: 100,
        radius: 20,
        dx: 0, 
        dy: 0,
        mass: 1 
    };
    let thermalEnergy = 0; // Tracks accumulated heat

    // Reset functionality
    document.getElementById('resetBtn').addEventListener('click', () => {
        ball.x = simCanvas.width / 2;
        ball.y = 100;
        ball.dx = 0; 
        ball.dy = 0;
        thermalEnergy = 0; // Reset heat
        energyHistory = [];
    });

    // Graph tracking
    let energyHistory = [];
    const maxHistory = graphCanvas.width; 

    function updatePhysics() {
        // Apply gravity to velocity
        ball.dy += physics.gravity;
        
        // Calculate energy lost to air friction (converted to thermal)
        let v2_before_fric = ball.dx * ball.dx + ball.dy * ball.dy;
        
        ball.dx *= (1 - physics.friction);
        ball.dy *= (1 - physics.friction);
        
        let v2_after_fric = ball.dx * ball.dx + ball.dy * ball.dy;
        thermalEnergy += 0.5 * ball.mass * (v2_before_fric - v2_after_fric);

        // Move ball
        ball.x += ball.dx;
        ball.y += ball.dy;

        // Collision logic (Floor)
        if (ball.y + ball.radius > simCanvas.height) {
            let penetration = (ball.y + ball.radius) - simCanvas.height;
            ball.y = simCanvas.height - ball.radius - penetration;
            
            // Calculate energy lost in inelastic bounce (converted to thermal)
            let dy_before_bounce = ball.dy;
            ball.dy = -ball.dy * physics.bounciness;
            let dy_after_bounce = ball.dy;
            
            thermalEnergy += 0.5 * ball.mass * (dy_before_bounce * dy_before_bounce - dy_after_bounce * dy_after_bounce);
            
        } 
        // Collision logic (Ceiling)
        else if (ball.y - ball.radius < 0) {
            let penetration = 0 - (ball.y - ball.radius);
            ball.y = ball.radius + penetration;
            
            let dy_before_bounce = ball.dy;
            ball.dy = -ball.dy * physics.bounciness;
            let dy_after_bounce = ball.dy;
            
            thermalEnergy += 0.5 * ball.mass * (dy_before_bounce * dy_before_bounce - dy_after_bounce * dy_after_bounce);
        }

        // Just in case lateral movement is ever added back, handle walls
        if (ball.x + ball.radius > simCanvas.width) {
            let penetration = (ball.x + ball.radius) - simCanvas.width;
            ball.x = simCanvas.width - ball.radius - penetration;
            
            let dx_before = ball.dx;
            ball.dx = -ball.dx * physics.bounciness;
            thermalEnergy += 0.5 * ball.mass * (dx_before * dx_before - ball.dx * ball.dx);
            
        } else if (ball.x - ball.radius < 0) {
            let penetration = 0 - (ball.x - ball.radius);
            ball.x = ball.radius + penetration;
            
            let dx_before = ball.dx;
            ball.dx = -ball.dx * physics.bounciness;
            thermalEnergy += 0.5 * ball.mass * (dx_before * dx_before - ball.dx * ball.dx);
        }
    }

    function calculateEnergy() {
        // Kinetic Energy
        let ke = 0.5 * ball.mass * (ball.dx * ball.dx + ball.dy * ball.dy);
        
        // Potential Energy 
        let height = simCanvas.height - ball.y - ball.radius;
        let pe = ball.mass * physics.gravity * height; 
        
        // Total Energy (Mechanical + Thermal)
        let te = ke + pe + thermalEnergy;

        energyHistory.push({ te, ke, pe, th: thermalEnergy });
        if (energyHistory.length > maxHistory) {
            energyHistory.shift();
        }
    }

    function drawSim() {
        simCtx.clearRect(0, 0, simCanvas.width, simCanvas.height);
        
        // Draw grid lines
        simCtx.strokeStyle = "#333";
        simCtx.lineWidth = 1;
        for(let i=0; i<simCanvas.height; i+=100) {
            simCtx.beginPath(); simCtx.moveTo(0, i); simCtx.lineTo(simCanvas.width, i); simCtx.stroke();
        }

        // Draw ball
        simCtx.beginPath();
        simCtx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        
        // Make the ball get redder as it gets hotter (based on thermal energy)
        let heatIntensity = Math.min(255, Math.floor(thermalEnergy / 5));
        simCtx.fillStyle = `rgb(${heatIntensity}, ${255 - heatIntensity}, 204)`;
        
        simCtx.fill();
        simCtx.closePath();
    }

    function drawGraph() {
        graphCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);
        if (energyHistory.length === 0) return;

        // Find max energy to scale the graph dynamically
        let maxEnergy = Math.max(...energyHistory.map(e => e.te)) * 1.1;
        if (maxEnergy < 10) maxEnergy = 10; 

        function drawLine(key, color) {
            graphCtx.beginPath();
            graphCtx.strokeStyle = color;
            graphCtx.lineWidth = 2;
            
            for (let i = 0; i < energyHistory.length; i++) {
                let x = i;
                let y = graphCanvas.height - (energyHistory[i][key] / maxEnergy) * graphCanvas.height;
                
                if (i === 0) graphCtx.moveTo(x, y);
                else graphCtx.lineTo(x, y);
            }
            graphCtx.stroke();
        }

        drawLine('pe', '#4488ff'); // Blue (Potential)
        drawLine('th', '#ffaa00'); // Orange (Thermal)
        drawLine('ke', '#ff4444'); // Red (Kinetic)
        drawLine('te', '#ffffff'); // White (Total)
    }

    function animate() {
        updatePhysics();
        calculateEnergy();
        drawSim();
        drawGraph();
        requestAnimationFrame(animate);
    }

    // Start simulation
    animate();
</script>

</body>
</html>
