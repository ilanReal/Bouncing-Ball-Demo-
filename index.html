<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncing Ball Simulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Bouncing Balls</h1>
      <p class="subtitle">Physics simulation — click the canvas to spawn a ball</p>
    </header>

    <main>
      <canvas id="canvas"></canvas>

      <div class="controls">
        <div class="ctrl-group">
          <label for="gravity">Gravity <span id="gravity-val">0.5</span></label>
          <input type="range" id="gravity" min="0.1" max="2" step="0.1" value="0.5" />
        </div>
        <div class="ctrl-group">
          <label for="restitution">Bounce <span id="res-val">0.75</span></label>
          <input type="range" id="restitution" min="0.1" max="1" step="0.05" value="0.75" />
        </div>
        <div class="ctrl-group">
          <label for="friction">Friction <span id="fric-val">0.990</span></label>
          <input type="range" id="friction" min="0.9" max="1" step="0.002" value="0.99" />
        </div>
        <div class="ctrl-group">
          <label for="count">Ball count <span id="count-val">5</span></label>
          <input type="range" id="count" min="1" max="20" step="1" value="5" />
        </div>
      </div>

      <div class="btn-row">
        <button id="btn-add">+ Add ball</button>
        <button id="btn-clear">Clear</button>
        <button id="btn-reset">Reset</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-gravity">Gravity: on</button>
        <button id="btn-explode">Explode!</button>
      </div>

      <div class="stats">
        <div class="stat">Balls: <strong id="stat-balls">5</strong></div>
        <div class="stat">Avg speed: <strong id="stat-speed">0.0</strong></div>
        <div class="stat">Collisions: <strong id="stat-coll">0</strong></div>
      </div>
    </main>
  </div>

  <script src="simulation.js"></script>
</body>
</html>
